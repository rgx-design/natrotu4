登录</a>             </div>         </div>     </div>      <script>console.log("[DEBUG] Script tag found, version: 548");
window.addEventListener("error", function(e) { console.error("[JS ERROR]", e.message, "at", e.filename, ":", e.lineno); });
         // ==================== API 配置 ====================         const API_BASE = 'https://natrotu4-production.up.railway.app';                  // 当前用户状态         let currentUser = null;         let authToken = null;          // ==================== 加载状态管理 ====================         function showLoading() {             document.getElementById('loadingOverlay').style.display = 'flex';         }          function hideLoading() {             document.getElementById('loadingOverlay').style.display = 'none';         }          // ==================== 错误和成功提示 ====================         function showError(id, msg) {             const el = document.getElementById(id);             el.textContent = msg;             el.style.display = 'block';             el.className = 'auth-error';         }          function showSuccess(id, msg) {             const el = document.getElementById(id);             el.textContent = msg;             el.style.display = 'block';             el.className = 'auth-success';         }          function clearError(id) {             const el = document.getElementById(id);             el.style.display = 'none';         }          // ==================== 模态框控制 ====================         function showLogin() {             document.getElementById('loginModal').style.display = 'flex';             document.getElementById('loginUsername').focus();             clearError('loginError');         }          function hideLogin() {             document.getElementById('loginModal').style.display = 'none';             clearError('loginError');             document.getElementById('loginUsername').value = '';             document.getElementById('loginPassword').value = '';         }          function showRegister() {             document.getElementById('registerModal').style.display = 'flex';             document.getElementById('regUsername').focus();             clearError('regError');         }          function hideRegister() {             document.getElementById('registerModal').style.display = 'none';             clearError('regError');             document.getElementById('regUsername').value = '';             document.getElementById('regEmail').value = '';             document.getElementById('regPassword').value = '';             document.getElementById('regConfirm').value = '';         }          function switchToRegister() {             hideLogin();             showRegister();         }          function switchToLogin() {             hideRegister();             showLogin();         }          // 点击背景关闭         document.getElementById('loginModal').addEventListener('click', (e) => {             if (e.target.id === 'loginModal') hideLogin();         });         document.getElementById('registerModal').addEventListener('click', (e) => {             if (e.target.id === 'registerModal') hideRegister();         });          // ==================== 表单验证 ====================         function validateUsername(username) {             const forbiddenWords = ['admin', '管理员', '系统', 'root', 'super', 'mod', '版主',                  '客服', 'demo', '演示', 'hack', '攻击', '病毒',                  '木马', '钓鱼', '诈骗', '色情', '赌博', '暴力', '违法', '违禁'];                          for (const word of forbiddenWords) {                 if (username.toLowerCase().includes(word.toLowerCase())) {                     return { valid: false, message: '用户名包含非法关键词' };                 }             }                          if (!/^[\u4e00-\u9fa5a-zA-Z0-9_]{2,20}$/.test(username)) {                 return { valid: false, message: '用户名只能包含中文、英文、数字和下划线，长度2-20字符' };             }                          return { valid: true };         }          // ==================== 用户注册 ====================         async function doRegister() {             const username = document.getElementById('regUsername').value.trim();             const email = document.getElementById('regEmail').value.trim();             const password = document.getElementById('regPassword').value.trim();             const confirm = document.getElementById('regConfirm').value.trim();                          // 客户端验证             if (!username || !email || !password || !confirm) {                 showError('regError', '请填写完整信息');                 return;             }                          const usernameCheck = validateUsername(username);             if (!usernameCheck.valid) {                 showError('regError', usernameCheck.message);                 return;             }                          if (password.length < 6) {                 showError('regError', '密码至少6位');                 return;             }                          if (password !== confirm) {                 showError('regError', '两次输入的密码不一致');                 return;             }              // 邮箱格式验证             const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;             if (!emailRegex.test(email)) {                 showError('regError', '请输入有效的邮箱格式');                 return;             }              // 禁用按钮，显示加载状态             const regBtn = document.getElementById('regBtn');             regBtn.disabled = true;             regBtn.textContent = '注册中...';             clearError('regError');              try {                 const response = await fetch(`${API_BASE}/register`, {                     method: 'POST',                     headers: { 'Content-Type': 'application/json' },                     body: JSON.stringify({ username, email, password })                 });                  const data = await response.json();                  if (response.ok) {                     showSuccess('regError', `注册成功！获得初始积分 ${data.initialPoints} 分`);                                          // 保存用户信息（使用服务器返回的完整数据）                     authToken = data.token || null;                     currentUser = data.user || { username, email };                     localStorage.setItem('natrotu_user', JSON.stringify(currentUser));                     if (authToken) {                         localStorage.setItem('natrotu_token', authToken);                     }                      // 延迟后跳转到游戏页面                     setTimeout(() => {                         goToGame();                     }, 1500);                 } else {                     showError('regError', data.message || '注册失败');                 }             } catch (error) {                 showError('regError', '服务器连接失败，请确保服务器正在运行');             } finally {                 regBtn.disabled = false;                 regBtn.textContent = '注册';             }         }          // ==================== 用户登录 ====================         async function doLogin() {             const username = document.getElementById('loginUsername').value.trim();             const password = document.getElementById('loginPassword').value.trim();                          if (!username || !password) {                 showError('loginError', '请输入用户名和密码');                 return;             }              // 禁用按钮，显示加载状态             const loginBtn = document.getElementById('loginBtn');             loginBtn.disabled = true;             loginBtn.textContent = '登录中...';             clearError('loginError');              try {                 const response = await fetch(`${API_BASE}/login`, {                     method: 'POST',                     headers: { 'Content-Type': 'application/json' },                     body: JSON.stringify({ username, password })                 });                  const data = await response.json();                  if (response.ok) {                     // 保存用户信息和Token                     authToken = data.token;                     currentUser = data.user;                                          localStorage.setItem('natrotu_user', JSON.stringify(currentUser));                     localStorage.setItem('natrotu_token', authToken);                     if (data.progress) {                         localStorage.setItem('natrotu_progress', JSON.stringify(data.progress));                     }                      hideLogin();                     updateHeaderAuth();                     goToGame();                 } else {                     showError('loginError', data.message || '登录失败');                 }             } catch (error) {                 showError('loginError', '服务器连接失败，请确保服务器正在运行');             } finally {                 loginBtn.disabled = false;                 loginBtn.textContent = '登录';             }         }          // ==================== 更新页面头部用户状态 ====================         function updateHeaderAuth() {             const savedUser = localStorage.getItem('natrotu_user');             const savedProgress = localStorage.getItem('natrotu_progress');                          if (savedUser) {                 currentUser = JSON.parse(savedUser);                 authToken = localStorage.getItem('natrotu_token');                                  let pointsHtml = '';                 if (savedProgress) {                     const progress = JSON.parse(savedProgress);                     pointsHtml = `<span class="user-points">${progress.totalPoints} 积分</span>`;                 }                                  document.getElementById('headerAuth').innerHTML = `                     <span class="user-welcome">欢迎, ${currentUser.username}</span>                     ${pointsHtml}                     <button class="btn-login" onclick="logout()">退出</button>                 `;             }         }          // ==================== 退出登录 ====================         function logout() {             localStorage.removeItem('natrotu_user');             localStorage.removeItem('natrotu_token');             localStorage.removeItem('natrotu_progress');             currentUser = null;             authToken = null;                          // 恢复登录/注册按钮             document.getElementById('headerAuth').innerHTML = `                 <button class="btn-login" onclick="showLogin()">登录</button>                 <button class="btn-register" onclick="showRegister()">免费注册</button>             `;                          // 刷新排行榜             showRank('total');         }          // ==================== 进入游戏 ====================         function goToGame() {             const savedUser = localStorage.getItem('natrotu_user');             const savedToken = localStorage.getItem('natrotu_token');                          if (savedUser && savedToken) {                 // 保存到 sessionStorage 供游戏页面使用                 sessionStorage.setItem('natrotu_user', savedUser);                 sessionStorage.setItem('natrotu_token', savedToken);                                  // 跳转到游戏页面                 window.location.href = './app/natrotu6.html';             } else {                 showLogin();             }         }          function scrollToRank() {             document.getElementById('rank').scrollIntoView({ behavior: 'smooth' });         }          // ==================== 等级系统 ====================         function getLevel(points) {             if (points >= 10000) return '影';             if (points >= 6000) return '精英上忍';             if (points >= 3000) return '上忍';             if (points >= 1000) return '中忍';             return '下忍';         }          // ==================== 获取头像 ====================         function getDefaultAvatar(id) {             return `./auth/logo/${id || 1}.png`;         }          // ==================== 获取排行榜 ====================         async function fetchLeaderboard(type = 'total') {             try {                 const response = await fetch(`${API_BASE}/leaderboard?type=${type}&limit=10`);                 if (response.ok) {                     const data = await response.json();                     // 后端返回 { leaderboard: [...] } 格式                     return Array.isArray(data) ? data : (data.leaderboard || []);                 }             } catch (error) {                 console.error('获取排行榜失败:', error);             }             return [];         }          // ==================== 渲染排行榜 ====================         async function renderRank(type) {             const list = await fetchLeaderboard(type);             const container = document.getElementById('rankList');                          if (list.length === 0) {                 container.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">暂无数据，请先注册账号</div>';                 return;             }              container.innerHTML = list.map((user, index) => {                 const numClass = index === 0 ? 'gold' : index === 1 ? 'silver' : index === 2 ? 'bronze' : 'normal';                 const points = type === 'total' ? user.points : user.points;                 const level = getLevel(type === 'total' ? user.points : 0);                                  return `                     <div class="rank-item">                         <div class="rank-num ${numClass}">${user.rank || index + 1}</div>                         <img class="rank-avatar" src="${getDefaultAvatar(user.avatar)}" alt="${user.username}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🔥</text><\/svg>'">                         <div class="rank-info">                             <div class="rank-name">${user.username}</div>                             <div class="rank-level">${level}</div>                         </div>                         <div class="rank-points">${points}分</div>                     </div>                 `;             }).join('');         }          function showRank(type) {             document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));             event.target.classList.add('active');             renderRank(type);         }          // ==================== 渲染跑马灯 ====================         async function renderMarquee() {             const list = await fetchLeaderboard('total');                          if (list.length === 0) {                 document.getElementById('marqueeSection').style.display = 'none';                 return;             }              const container = document.getElementById('marqueeContainer');             const items = list.slice(0, 15).map(u => {                 const points = u.points > 0 ? `${u.points}分` : '0分';                 return `                 <div class="marquee-item">                     <img class="marquee-avatar" src="${getDefaultAvatar(u.avatar)}" alt="${u.username}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🔥</text><\/svg>'">                     <span class="marquee-name">${u.username}</span>                     <span class="marquee-icon">⭐</span>                     <span class="marquee-points">${points}</span>                 </div>             `;             }).join('');              container.innerHTML = items + items;         }          // ==================== 页面初始化 ====================         document.addEventListener('DOMContentLoaded', async () => {             // 检查登录状态             updateHeaderAuth();                          // 加载排行榜             await renderRank('total');             await renderMarquee();              // 自动刷新排行榜             setInterval(async () => {                 const activeTab = document.querySelector('.tab-btn.active');                 if (activeTab) {                     const type = activeTab.textContent.includes('今日') ? 'daily' : 'total';                     await renderRank(type);                 }             }, 30000);         });     </script> </body> </html>
