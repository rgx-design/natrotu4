<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火影背单词 - 像修炼忍术一样背单词</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(180deg, #fff8e1 0%, #ffe0b2 50%, #ffcc80 100%);
            overflow-x: hidden;
        }

        .header {
            background: linear-gradient(90deg, #e65100 0%, #ff7043 50%, #e65100 100%);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(230,81,0,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-logo { font-size: 28px; font-weight: bold; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .header-nav { display: flex; gap: 30px; }
        .header-nav a { color: rgba(255,255,255,0.9); text-decoration: none; font-weight: 500; font-size: 15px; transition: all 0.2s; }
        .header-nav a:hover { color: #fff; }
        .header-auth { display: flex; gap: 15px; }
        .btn-login { padding: 8px 20px; background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.4); border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        .btn-login:hover { background: rgba(255,255,255,0.3); }
        .btn-register { padding: 8px 20px; background: #fff; color: #e65100; border: none; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.2s; }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255,255,255,0.4); }

        .hero-section {
            position: relative;
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 40px 60px;
            overflow: hidden;
        }
        .hero-content { flex: 1; z-index: 2; }
        .hero-title { font-size: 48px; font-weight: bold; color: #333; margin-bottom: 20px; line-height: 1.3; }
        .hero-title span { color: #e65100; }
        .hero-desc { font-size: 18px; color: #666; margin-bottom: 30px; line-height: 1.6; }
        .hero-buttons { display: flex; gap: 20px; }
        .btn-start { padding: 14px 36px; background: linear-gradient(135deg, #e65100 0%, #ff7043 100%); color: white; border: none; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; transition: all 0.3s; box-shadow: 0 6px 20px rgba(230,81,0,0.4); }
        .btn-start:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(230,81,0,0.5); }
        .btn-rank { padding: 14px 36px; background: rgba(255,255,255,0.8); color: #e65100; border: 2px solid #e65100; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .btn-rank:hover { background: #fff; }
        .hero-image { flex: 1; text-align: center; z-index: 2; }
        .hero-image img { max-width: 450px; height: auto; }

        .hero-bg-pattern {
            position: absolute;
            top: 0; right: 0; width: 60%; height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="%23e65100" opacity="0.05"/>\</svg>');
            background-size: 200px;
            z-index: 1;
        }

        .marquee-section {
            background: linear-gradient(90deg, #fff3e0 0%, #ffe0b2 50%, #fff3e0 100%);
            padding: 12px 0;
            border-top: 2px solid #ffcc80;
            border-bottom: 2px solid #ffcc80;
            overflow: hidden;
        }
        .marquee-container {
            display: flex;
            animation: marquee 20s linear infinite;
        }
        .marquee-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 40px;
            white-space: nowrap;
        }
        .marquee-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 2px solid #e65100; }
        .marquee-name { font-weight: 600; color: #333; }
        .marquee-points { color: #e65100; font-weight: bold; }
        .marquee-icon { color: #ffc107; font-size: 16px; }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .leaderboard-section {
            padding: 40px 60px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .section-title { font-size: 32px; font-weight: bold; color: #333; text-align: center; margin-bottom: 30px; }
        .section-title span { color: #e65100; }

        .leaderboard-container {
            background: rgba(255,255,255,0.9);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border: 2px solid #ffe0b2;
        }

        .tabs { display: flex; gap: 20px; margin-bottom: 30px; }
        .tab-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active { background: linear-gradient(135deg, #e65100 0%, #ff7043 100%); color: white; }
        .tab-btn:not(.active) { background: #f5f5f5; color: #666; }
        .tab-btn:not(.active):hover { background: #eee; }

        .rank-list { }
        .rank-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }
        .rank-item:hover { background: #fff8e1; }
        .rank-item:nth-child(1) { background: linear-gradient(90deg, #fff9c4 0%, #fff59d 100%); }
        .rank-item:nth-child(2) { background: linear-gradient(90deg, #f5f5f5 0%, #e0e0e0 100%); }
        .rank-item:nth-child(3) { background: linear-gradient(90deg, #fff3e0 0%, #ffe0b2 100%); }

        .rank-num {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: bold;
            margin-right: 15px;
        }
        .rank-num.gold { background: #ffc107; color: #fff; }
        .rank-num.silver { background: #9e9e9e; color: #fff; }
        .rank-num.bronze { background: #ff9800; color: #fff; }
        .rank-num.normal { background: #e0e0e0; color: #666; }

        .rank-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 3px solid #eee; margin-right: 15px; }
        .rank-item:nth-child(1) .rank-avatar { border-color: #ffc107; }
        .rank-item:nth-child(2) .rank-avatar { border-color: #9e9e9e; }
        .rank-item:nth-child(3) .rank-avatar { border-color: #ff9800; }

        .rank-info { flex: 1; }
        .rank-name { font-size: 16px; font-weight: 600; color: #333; }
        .rank-level { font-size: 12px; color: #999; }

        .rank-points { font-size: 20px; font-weight: bold; color: #e65100; }

        .auth-modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .auth-modal {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-title { font-size: 24px; font-weight: bold; color: #e65100; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; font-weight: 600; color: #333; margin-bottom: 8px; }
        .form-input {
            width: 100%; padding: 12px 16px;
            border: 2px solid #eee; border-radius: 10px;
            font-size: 15px; outline: none;
            transition: border-color 0.2s;
        }
        .form-input:focus { border-color: #e65100; }
        .form-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #e65100 0%, #ff7043 100%);
            color: white; border: none; border-radius: 12px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            margin-top: 10px;
        }
        .form-link { text-align: center; margin-top: 15px; font-size: 14px; color: #666; }
        .form-link a { color: #e65100; text-decoration: none; font-weight: 500; }
        .close-modal {
            position: absolute; top: 15px; right: 15px;
            width: 32px; height: 32px; border-radius: 50%;
            background: #f5f5f5; border: none; cursor: pointer;
            font-size: 18px; color: #666;
        }
        .auth-error { color: #f44336; font-size: 13px; margin-top: 8px; display: none; }

        .footer {
            background: #333; color: #fff;
            padding: 40px 60px;
            margin-top: 60px;
        }
        .footer-content { max-width: 1200px; margin: 0 auto; text-align: center; }
        .footer-links { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; }
        .footer-links a { color: rgba(255,255,255,0.7); text-decoration: none; }
        .footer-copyright { color: rgba(255,255,255,0.5); font-size: 14px; }

        @media (max-width: 768px) {
            .header { padding: 12px 15px; }
            .header-logo { font-size: 20px; }
            .header-nav { display: none; }
            .hero-section { flex-direction: column; padding: 20px; text-align: center; }
            .hero-title { font-size: 32px; }
            .hero-buttons { flex-direction: column; align-items: center; }
            .hero-image img { max-width: 280px; }
            .leaderboard-section { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-logo">🔥 火影背单词</div>
        <div class="header-nav">
            <a href="#features">功能介绍</a>
            <a href="#wordbooks">词汇库</a>
            <a href="#rank">排行榜</a>
        </div>
        <div class="header-auth">
            <button class="btn-login" onclick="showLogin()">登录</button>
            <button class="btn-register" onclick="showRegister()">免费注册</button>
        </div>
    </div>

    <div class="hero-section">
        <div class="hero-bg-pattern"></div>
        <div class="hero-content">
            <h1 class="hero-title">像修炼<span>忍术</span>一样背单词</h1>
            <p class="hero-desc">每日任务、排行榜竞技、错词复习，让词汇学习更有成就感</p>
            <div class="hero-buttons">
                <button class="btn-start" onclick="goToGame()">开始学习</button>
                <button class="btn-rank" onclick="scrollToRank()">查看排行榜</button>
            </div>
        </div>
        <div class="hero-image">
            <img src="./assets/img/naruto_team.png" alt="火影忍者">
        </div>
    </div>

    <div class="marquee-section">
        <div class="marquee-container" id="marqueeContainer"></div>
    </div>

    <div class="leaderboard-section" id="rank">
        <h2 class="section-title">🏆 <span>木叶战力榜</span></h2>
        <div class="leaderboard-container">
            <div class="tabs">
                <button class="tab-btn active" onclick="showRank('total')">总计分榜</button>
                <button class="tab-btn" onclick="showRank('daily')">今日积分榜</button>
            </div>
            <div class="rank-list" id="rankList"></div>
        </div>
    </div>

    <div class="footer">
        <div class="footer-content">
            <div class="footer-links">
                <a href="#features">功能介绍</a>
                <a href="#wordbooks">词汇库</a>
                <a href="#rank">排行榜</a>
            </div>
            <div class="footer-copyright">© 2024 火影背单词 - 让学习更有趣</div>
        </div>
    </div>

    <div class="auth-modal-overlay" id="loginModal">
        <div class="auth-modal">
            <button class="close-modal" onclick="hideLogin()">&times;</button>
            <h3 class="modal-title">登录</h3>
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" class="form-input" id="loginUsername" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码">
            </div>
            <div class="auth-error" id="loginError"></div>
            <button class="form-btn" onclick="doLogin()">登录</button>
            <div class="form-link">
                还没有账号？<a href="javascript:void(0)" onclick="switchToRegister()">立即注册</a>
            </div>
        </div>
    </div>

    <div class="auth-modal-overlay" id="registerModal">
        <div class="auth-modal">
            <button class="close-modal" onclick="hideRegister()">&times;</button>
            <h3 class="modal-title">注册</h3>
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" class="form-input" id="regUsername" placeholder="请输入用户名（2-20字符）">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" id="regPassword" placeholder="请输入密码（至少6位）">
            </div>
            <div class="form-group">
                <label class="form-label">确认密码</label>
                <input type="password" class="form-input" id="regConfirm" placeholder="请再次输入密码">
            </div>
            <div class="auth-error" id="regError"></div>
            <button class="form-btn" onclick="doRegister()">注册</button>
            <div class="form-link">
                已有账号？<a href="javascript:void(0)" onclick="switchToLogin()">立即登录</a>
            </div>
        </div>
    </div>

    <script src="./auth/userManager.js"></script>
    <script>
        function showLogin() {
            document.getElementById('loginModal').style.display = 'flex';
            document.getElementById('loginUsername').focus();
        }
        function hideLogin() {
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('loginError').style.display = 'none';
        }
        function showRegister() {
            document.getElementById('registerModal').style.display = 'flex';
            document.getElementById('regUsername').focus();
        }
        function hideRegister() {
            document.getElementById('registerModal').style.display = 'none';
            document.getElementById('regError').style.display = 'none';
        }
        function switchToRegister() {
            hideLogin();
            showRegister();
        }
        function switchToLogin() {
            hideRegister();
            showLogin();
        }

        function doLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            
            if (!username || !password) {
                showError('loginError', '请输入用户名和密码');
                return;
            }

            const loginResult = userManager.login(username, password);
            if (loginResult.success) {
                hideLogin();
                localStorage.setItem('naruto_current_user', username);
                goToGame();
            } else {
                showError('loginError', loginResult.message);
            }
        }

        function validateUsername(username) {
            const forbiddenWords = ['admin', '管理员', '系统', 'root', 'super', 'mod', '版主', 
                '客服', 'demo', '演示', 'hack', '攻击', '病毒', 
                '木马', '钓鱼', '诈骗', '色情', '赌博', '暴力', '违法', '违禁'];
            
            for (const word of forbiddenWords) {
                if (username.toLowerCase().includes(word.toLowerCase())) {
                    return { valid: false, message: '用户名包含非法关键词' };
                }
            }
            
            if (!/^[\u4e00-\u9fa5a-zA-Z0-9_]{2,20}$/.test(username)) {
                return { valid: false, message: '用户名只能包含中文、英文、数字和下划线，长度2-20字符' };
            }
            
            return { valid: true };
        }

        function doRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const confirm = document.getElementById('regConfirm').value.trim();
            
            if (!username || !password || !confirm) {
                showError('regError', '请填写完整信息');
                return;
            }
            
            const usernameCheck = validateUsername(username);
            if (!usernameCheck.valid) {
                showError('regError', usernameCheck.message);
                return;
            }
            
            if (password.length < 6) {
                showError('regError', '密码至少6位');
                return;
            }
            
            if (password !== confirm) {
                showError('regError', '两次输入的密码不一致');
                return;
            }

            const regResult = userManager.register(username, password, 1);
            if (regResult.success) {
                hideRegister();
                localStorage.setItem('naruto_current_user', username);
                goToGame();
            } else {
                showError('regError', regResult.message);
            }
        }

        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.style.display = 'block';
        }

        function goToGame() {
            const currentUser = localStorage.getItem('naruto_current_user');
            if (currentUser && userManager.getUser(currentUser)) {
                window.location.href = './app/natrotu6.html';
            } else {
                showLogin();
            }
        }

        function scrollToRank() {
            document.getElementById('rank').scrollIntoView({ behavior: 'smooth' });
        }

        function getLevel(points) {
            if (points >= 10000) return '影';
            if (points >= 6000) return '精英上忍';
            if (points >= 3000) return '上忍';
            if (points >= 1000) return '中忍';
            return '下忍';
        }

        function getDefaultAvatar(id) {
            return `./auth/logo/${id}.png`;
        }

        function renderRank(type) {
            const users = userManager.getAllUsers();
            const list = users.map(u => ({
                username: u,
                totalPoints: userManager.getUserProgress(u)?.totalPoints || 0,
                dailyPoints: userManager.getUserProgress(u)?.dailyPoints || 0,
                avatar: userManager.getUserProgress(u)?.avatar || 1
            })).sort((a, b) => type === 'total' ? b.totalPoints - a.totalPoints : b.dailyPoints - a.dailyPoints).slice(0, 10);

            const container = document.getElementById('rankList');
            container.innerHTML = list.map((user, index) => {
                const numClass = index === 0 ? 'gold' : index === 1 ? 'silver' : index === 2 ? 'bronze' : 'normal';
                const points = type === 'total' ? user.totalPoints : user.dailyPoints;
                return `
                    <div class="rank-item">
                        <div class="rank-num ${numClass}">${index + 1}</div>
                        <img class="rank-avatar" src="${getDefaultAvatar(user.avatar)}" alt="${user.username}">
                        <div class="rank-info">
                            <div class="rank-name">${user.username}</div>
                            <div class="rank-level">${getLevel(type === 'total' ? user.totalPoints : 0)}</div>
                        </div>
                        <div class="rank-points">${points}分</div>
                    </div>
                `;
            }).join('');
        }

        function showRank(type) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderRank(type);
        }

        function renderMarquee() {
            const users = userManager.getAllUsers();
            const list = users.map(u => {
                const progress = userManager.getUserProgress(u);
                return {
                    username: u,
                    dailyPoints: progress?.dailyPoints || 0,
                    totalPoints: progress?.totalPoints || 0,
                    avatar: progress?.avatar || 1
                };
            }).sort((a, b) => b.totalPoints - a.totalPoints).slice(0, 15);

            if (list.length === 0) {
                document.querySelector('.marquee-section').style.display = 'none';
                return;
            }

            const container = document.getElementById('marqueeContainer');
            const items = list.map(u => {
                const points = u.dailyPoints > 0 ? `+${u.dailyPoints}分` : `${u.totalPoints}分`;
                return `
                <div class="marquee-item">
                    <img class="marquee-avatar" src="${getDefaultAvatar(u.avatar)}" alt="${u.username}">
                    <span class="marquee-name">${u.username}</span>
                    <span class="marquee-icon">⭐</span>
                    <span class="marquee-points">${points}</span>
                </div>
            `;
            }).join('');

            container.innerHTML = items + items;
        }

        function initDemoUsers() {
            const existingUsers = userManager.getAllUsers();
            if (existingUsers.length > 0) return;
            
            const demoUsers = {
                '鸣人': {
                    password: 'demo123',
                    avatar: 1,
                    createdAt: new Date().toISOString(),
                    learnedWords: {},
                    wrongWords: [],
                    totalCorrect: 0,
                    totalWrong: 0,
                    gamesPlayed: 0,
                    customWordbooks: [],
                    totalPoints: 12800,
                    dailyPoints: 500,
                    streakDays: 5,
                    lastLoginDate: new Date().toISOString(),
                    lastGameDate: new Date().toISOString().split('T')[0],
                    todayStudyWords: 20,
                    todayStudyTime: 300
                },
                '佐助': {
                    password: 'demo123',
                    avatar: 2,
                    createdAt: new Date().toISOString(),
                    learnedWords: {},
                    wrongWords: [],
                    totalCorrect: 0,
                    totalWrong: 0,
                    gamesPlayed: 0,
                    customWordbooks: [],
                    totalPoints: 9420,
                    dailyPoints: 300,
                    streakDays: 3,
                    lastLoginDate: new Date().toISOString(),
                    lastGameDate: new Date().toISOString().split('T')[0],
                    todayStudyWords: 15,
                    todayStudyTime: 240
                },
                '小樱': {
                    password: 'demo123',
                    avatar: 3,
                    createdAt: new Date().toISOString(),
                    learnedWords: {},
                    wrongWords: [],
                    totalCorrect: 0,
                    totalWrong: 0,
                    gamesPlayed: 0,
                    customWordbooks: [],
                    totalPoints: 8890,
                    dailyPoints: 150,
                    streakDays: 2,
                    lastLoginDate: new Date().toISOString(),
                    lastGameDate: new Date().toISOString().split('T')[0],
                    todayStudyWords: 10,
                    todayStudyTime: 180
                },
                '卡卡西': {
                    password: 'demo123',
                    avatar: 4,
                    createdAt: new Date().toISOString(),
                    learnedWords: {},
                    wrongWords: [],
                    totalCorrect: 0,
                    totalWrong: 0,
                    gamesPlayed: 0,
                    customWordbooks: [],
                    totalPoints: 6500,
                    dailyPoints: 0,
                    streakDays: 1,
                    lastLoginDate: new Date().toISOString(),
                    lastGameDate: '',
                    todayStudyWords: 0,
                    todayStudyTime: 0
                }
            };
            localStorage.setItem('naruto_users', JSON.stringify(demoUsers));
            userManager.users = demoUsers;
        }

        document.addEventListener('DOMContentLoaded', () => {
            initDemoUsers();
            renderRank('total');
            renderMarquee();

            const currentUser = localStorage.getItem('naruto_current_user');
            if (currentUser && userManager.getUser(currentUser)) {
                document.querySelector('.header-auth').innerHTML = `
                    <span style="color:white; font-weight:500;">欢迎, ${currentUser}</span>
                    <button class="btn-login" onclick="localStorage.removeItem('naruto_current_user');location.reload()">退出</button>
                `;
            }
        });

        document.getElementById('loginModal').addEventListener('click', (e) => {
            if (e.target.id === 'loginModal') hideLogin();
        });
        document.getElementById('registerModal').addEventListener('click', (e) => {
            if (e.target.id === 'registerModal') hideRegister();
        });
    </script>
</body>
</html>
